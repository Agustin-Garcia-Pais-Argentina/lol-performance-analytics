name: Riot ETL Pipeline

on:
  schedule:
    - cron: '0 3 * * *' # Ejecución programada (03:00 UTC diariamente)
  workflow_dispatch: # Permite ejecución manual desde la interfaz de GitHub

jobs:
  update-database:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv
          
      - name: Execute Riot ETL
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
        run: python riot_etl.py
        
      - name: Commit and Push SQLite Database
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lol_stats.db
          git commit -m "chore(data): automated SQLite database update" || echo "No changes to commit"
          git push